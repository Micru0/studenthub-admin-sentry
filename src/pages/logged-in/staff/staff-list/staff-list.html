<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Staff Members</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let staffMember of staff">
      <button ion-item (click)="rowSelected(staffMember)">
        {{ staffMember.staff_name }}
      </button>  

      <ion-item-options side="right">
        <button ion-button (click)="resetPassword(staffMember)">
          <ion-icon name="key"></ion-icon>
          Send Password
        </button>

        <button ion-button color="danger" (click)="delete(staffMember)">
          <ion-icon name="trash"></ion-icon>
          Delete
        </button>
      </ion-item-options>

    </ion-item-sliding>
</ion-list>

<ion-row text-center>
  <div class="pagination-wrapper">
    <button *ngFor="let page of pages" ion-button small color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
      {{ page }}
    </button>
  </div>
</ion-row>

</ion-content>

<ion-footer>
  <button ion-button full (click)="create()">
    Create
  </button>
</ion-footer>
