<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Summary</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  
  <ion-card *ngIf="statistics && statistics.transfers">
    <ion-card-header>
      Transfers
    </ion-card-header>

    <ion-list>
      <button ion-item *ngFor="let transfer of statistics.transfers">
        {{ transfer.count }} - {{ transfer.transfer_status }}
      </button>
    </ion-list>
  </ion-card>

</ion-content>
