<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Summary</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  
  <ion-card *ngIf="statistics && statistics.transfers">
    <ion-card-header>
      Transfers
    </ion-card-header>

    <ion-list>
      <button ion-item *ngFor="let transfer of statistics.transfers"  (click)=showTransfers(transfer.status_code)>
        <span class="status_{{transfer.status_code}}"> {{ transfer.count }} - {{ transfer.transfer_status }}</span>
      </button>
    </ion-list>
  </ion-card>

  <ion-card *ngIf="statistics && statistics.candidates">
    <ion-card-header>
      Candidate
    </ion-card-header>
    <ion-list>
        <button ion-item>
          {{statistics.candidates.total_candidate}} : Total Candidate
        </button>
        <button ion-item>
          {{statistics.candidates.total_approved}} : Total Approved
        </button>
        <button ion-item>
          {{statistics.candidates.total_unapproved}} : Total UnApproved
        </button>
        <button ion-item>
          {{statistics.candidates.total_assign}} : Total Assigned
        </button>
        <button ion-item>
          {{statistics.candidates.total_unassign}} : Total UnAssigned
        </button>
    </ion-list>
  </ion-card>

</ion-content>
