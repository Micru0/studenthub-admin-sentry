<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ bank.bank_name }}</ion-title>

    <ion-buttons right>
      <button ion-button (click)="update()">
        Update
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <h5>Bank ID</h5>
  <p>{{ bank.bank_id }}</p>

  <h5>Bank Name</h5>
  <p>{{ bank.bank_name }}</p>

  <h5>Bank Swift Code</h5>
  <p>{{ bank.bank_swift_code }}</p>

  <h5>Bank Address</h5>
  <p>{{ bank.bank_address }}</p>

  <h5>Bank Transfer Type</h5>
  <p>{{ bank.transfer_type_value }}</p>
</ion-content>
