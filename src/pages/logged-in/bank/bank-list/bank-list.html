<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Bank Members</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let bankMember of bank">
      <button ion-item (click)="rowSelected(bankMember)">
        {{ bankMember.bank_name }}
      </button>  

      <ion-item-options side="right">
        <button ion-button color="danger" (click)="delete(bankMember)">
          <ion-icon name="trash"></ion-icon>
          Delete
        </button>
      </ion-item-options>

    </ion-item-sliding>
</ion-list>
</ion-content>

<ion-footer>
  <button ion-button full (click)="create()">
    Create
  </button>
</ion-footer>
