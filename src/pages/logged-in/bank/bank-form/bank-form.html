<ion-header>
  <ion-navbar>
    <ion-buttons left>
      <button ion-button icon-only (click)="close()">
        <ion-icon name="close"></ion-icon>
      </button>
    </ion-buttons>

    <ion-title>{{ operation }}</ion-title>

    <ion-buttons right>
      <button ion-button clear color="primary" 
        [disabled]="!form.valid"
        (click)="save()">
        Save
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <form [formGroup]="form">
    <ion-list>
        <ion-item>
          <ion-label floating>Name</ion-label>
          <ion-input type="text" formControlName="name"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>Swift Code</ion-label>
          <ion-input type="text" formControlName="swift_code"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>Address</ion-label>
          <ion-input type="text" formControlName="address"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>Address</ion-label>
          <ion-select formControlName="type">
            <ion-option value="Local Bank Transfer">Local Bank Transfer</ion-option>
            <ion-option value="International Transfer">International Transfer</ion-option>
            <ion-option value="Within Bank Transfer">Within Bank Transfer</ion-option>
          </ion-select>
        </ion-item>
    </ion-list>
  </form>
</ion-content>
