<ion-split-pane>
    <!-- Menu Left -->
    <ion-menu #menuLeft side="left" type="overlay" [content]="loggedInContent">
      <ion-header>
        <ion-toolbar text-center style="height:auto;">
          <img class='logo' src="assets/icon.png" />
        </ion-toolbar>
      </ion-header>
      <ion-content>

        <ion-list>
          <ion-list-header>Action Points</ion-list-header>

          <button ion-item (click)="loadPage('summary')">
            <ion-icon name="stats" item-left></ion-icon>
            Summary
          </button>

           <button ion-item (click)="loadPage('candidate-review')">
            <ion-icon name="person" item-left></ion-icon>
            Candidate Review 
            <ion-badge item-right>
              {{ totalCandidateToReview }}
            </ion-badge>
          </button>

          <button ion-item (click)="loadPage('transfers')">
            <ion-icon name="globe" item-left></ion-icon>
            Transfers
          </button>

          <button ion-item (click)="loadPage('payable-candidates')">
            <ion-icon name="people" item-left></ion-icon>
            Payable Candidates
          </button>

          <ion-list-header>Accounts</ion-list-header>

          <button ion-item (click)="loadPage('companies')">
            <ion-icon name="briefcase" item-left></ion-icon>
            Companies
          </button>

          <button ion-item (click)="loadPage('staff')">
            <ion-icon name="people" item-left></ion-icon>
            Staff
          </button>

          <ion-list-header>Entities</ion-list-header>

          <button ion-item (click)="loadPage('bank')">
            <ion-icon name="cash" item-left></ion-icon>
            Banks
          </button>

          <button ion-item (click)="loadPage('university')">
            <ion-icon name="school" item-left></ion-icon>
            Universities
          </button>

          <button ion-item (click)="loadPage('country')">
            <ion-icon name="paper-plane" item-left></ion-icon>
            Countries
          </button>

          <ion-list-header>Personal</ion-list-header>

          <button ion-item (click)="logout()">
            <ion-icon name="ios-log-out" item-left></ion-icon>
            Logout
          </button>

        </ion-list>
      </ion-content>
    </ion-menu>

    <!-- Nav -->
    <ion-nav #loggedInContent swipeBackEnabled="true" [root]="rootPage" main></ion-nav>
</ion-split-pane>
