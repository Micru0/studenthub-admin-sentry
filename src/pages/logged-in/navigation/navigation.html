<ion-split-pane>
    <!-- Menu Left -->
    <ion-menu #menuLeft side="left" type="overlay" [content]="loggedInContent">
      <ion-header>
        <ion-toolbar text-center style="height:auto;">
          <img margin class='logo' src="assets/logo.png" />
          <h3>Payroll Admin</h3>
        </ion-toolbar>
      </ion-header>
      <ion-content>


        <ion-list>
          <ion-list-header>Personal</ion-list-header>

          <button ion-item (click)="loadPage('summary')">
            <ion-icon name="stats" item-left></ion-icon>
            Summary
          </button>

          <button ion-item (click)="loadPage('companies')">
            <ion-icon name="briefcase" item-left></ion-icon>
            Companies
          </button>

          <button ion-item (click)="loadPage('staff')">
            <ion-icon name="people" item-left></ion-icon>
            Staff
          </button>

          <button ion-item (click)="loadPage('bank')">
            <ion-icon name="cash" item-left></ion-icon>
            Bank
          </button>

          <button ion-item (click)="logout()">
            <ion-icon name="ios-log-out" item-left></ion-icon>
            Logout
          </button>

        </ion-list>
      </ion-content>
    </ion-menu>

    <!-- Nav -->
    <ion-nav #loggedInContent swipeBackEnabled="true" [root]="rootPage" main></ion-nav>
</ion-split-pane>
