<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ company.company_name }}</ion-title>

    <ion-buttons right>
      <button ion-button (click)="update()">
        Update
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <h5>Id</h5>
  <p>{{ company.company_id }}</p>

  <h5>Company</h5>
  <p>{{ company.company_name }}</p>

  <h5>Email</h5>
  <p>{{ company.company_email }}</p>

  <h5>Status</h5>
  <p>{{ company.company_status }}</p>

  <h5>Created at</h5>
  <p>{{ company.company_created_at }}</p>

  <h5>Updated at</h5>
  <p>{{ company.company_updated_at }}</p>

  <h5>Sub Companies</h5>
  <ion-list>
    <ion-item-sliding *ngFor="let company of subcompanies">
      <button ion-item (click)="rowSelected(company)">
        {{ company.company_name }}
      </button>  

      <ion-item-options side="right">
        <button ion-button color="danger" (click)="delete(company)">
          <ion-icon name="trash"></ion-icon>
          Delete
        </button>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

</ion-content>

<ion-footer>
  <button ion-button full (click)="create(company.company_id)">
    Create Sub Company
  </button>
</ion-footer>
