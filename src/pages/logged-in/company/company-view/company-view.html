<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ company.company_name }}</ion-title>

    <ion-buttons right>
      <button ion-button (click)="update()">
        Update
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <h5>ID</h5>
  <p>{{ company.company_id }}</p>

  <h5>Company</h5>
  <p>{{ company.company_name }}</p>

  <h5>Email</h5>
  <p>{{ company.company_email }}</p>

  <h5>Status</h5>
  <p>{{ company.company_status }}</p>


  <h5 *ngIf="subcompanies && subcompanies.length > 0">Sub Companies</h5>
  <ion-list>
    <ion-item-sliding *ngFor="let company of subcompanies">
      <button ion-item (click)="rowSelected(company)">
        {{ company.company_name }}
      </button>  

      <ion-item-options side="right">
        <button ion-button color="danger" (click)="delete(company)">
          <ion-icon name="trash"></ion-icon>
          Delete
        </button>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

  <h5 *ngIf="stores && stores.length > 0">Stores</h5>
  <ion-list>
    <ion-item-sliding *ngFor="let store of stores">
      <button ion-item (click)="storeSelected(store)">
        {{ store.store_name }}
      </button>  

      <ion-item-options side="right">
        <button ion-button color="danger" (click)="deleteStore(store)">
          <ion-icon name="trash"></ion-icon>
          Delete
        </button>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

</ion-content>

<ion-footer>
  <button *ngIf="!stores || stores.length == 0" ion-button full  (click)="create(company.company_id,1)">
    Create Sub Company
  </button>

  <button *ngIf="!subcompanies || subcompanies.length == 0" ion-button full (click)="createStore(company.company_id)">
    Create Store
  </button>
</ion-footer>
