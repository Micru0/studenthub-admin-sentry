<ion-header>
  <ion-navbar>
    <ion-buttons left>
      <button ion-button icon-only (click)="close()">
        <ion-icon name="close"></ion-icon>
      </button>
    </ion-buttons>

    <ion-title>{{ operation }}</ion-title>

    <ion-buttons right>
      <button ion-button clear color="primary" 
        (click)="save()">
        Save
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <form [formGroup]="form">

    <ion-input formControlName="name"
      type="text" placeholder="Name"></ion-input>

    <ion-input formControlName="email"
      type="text" placeholder="Email"></ion-input>

    <ion-input *ngIf="!model.company_id"
      formControlName="password"
      type="password" placeholder="Password"></ion-input>

  </form>
</ion-content>
