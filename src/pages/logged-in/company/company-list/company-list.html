<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Companies</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-list>
    <button ion-item *ngFor="let company of companies" (click)="rowSelected(company)">
      {{ company.company_name }}
    </button>  
</ion-list>
</ion-content>

<ion-footer>
  <button ion-button full (click)="create()">
    Create
  </button>
</ion-footer>
