<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ university.university_name_en }}</ion-title>

    <ion-buttons right>
      <button ion-button (click)="update()">
        Update
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <h5>University ID</h5>
  <p>{{ university.university_id }}</p>

  <h5>University Name</h5>
  <p>{{ university.university_name_en }}</p>

  <h5>University Name - Arabic</h5>
  <p>{{ university.university_name_ar }}</p>
  <br/><hr/>
  
  <!-- University Student List -->
  <div class="student-list" *ngIf="candidates">
    <h5>University Students</h5>
    <ion-list>
      <ion-item *ngFor="let candidate of candidates" (click)="candidateDetail(candidate)">
        {{candidate.candidate_name}}
      </ion-item>
    </ion-list>
  </div>
</ion-content>
