<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Transfer List</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let transfer of transfers |  orderBy:'transfer_created_at'">
      {{transfer.transfer_status}}
      <ion-item>
        <span *ngIf="transfer.transfer_status=='10'"> Transfer Initiated </span>
        <span *ngIf="transfer.transfer_status=='1'"> Payment Sent </span>
        <span *ngIf="transfer.transfer_status=='2'"> Payment Received </span>
        <span *ngIf="transfer.transfer_status=='3'"> Salary distribution in progress </span>
        <span *ngIf="transfer.transfer_status=='4'"> Transfer Completed </span>
        <span *ngIf="transfer.transfer_status=='5'"> Transfer Locked </span>

        <button ion-item [ngClass]="{'my-class': transfer.transfer_status=='1' }" (click)="transferDetails(transfer.transfer_id)">  
        Transfer Id : {{ transfer.transfer_id}}<br>    
        Company: {{ transfer.company_name }} <br> 
        Company Total: {{ transfer.company_total}} <br>   
        Total: {{ transfer.total}} <br>   
        Transfer Created: {{ transfer.transfer_created_at}}<br>
        Transfer Updated: {{ transfer.transfer_updated_at}}          
        </button>
      </ion-item>
    </ion-item-sliding>    
  </ion-list>

  <ion-row text-center>
    <div class="pagination-wrapper">
      <button *ngFor="let page of pages" ion-button small color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
        {{ page }}
      </button>
    </div>
  </ion-row>

</ion-content>
