<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Transfer List</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>

  <!-- Transfer Filter -->
  <ion-card>
    <ion-list>
      <ion-list-header>
        Filter by
      </ion-list-header>
      <!-- Filter by Company Name -->
      <ion-item>
        <ion-label color="primary" stacked>Company name</ion-label>
        <ion-input type="text" placeholder="Enter Company Name" [(ngModel)]="companyName" (change)="loadData(1)"></ion-input>
      </ion-item>

      <!-- Filter by Transfer Status -->
      <ion-item>
        <ion-label color="primary" stacked>Transfer Status</ion-label>
        <ion-select [(ngModel)]="transferStatus" (ionChange)="loadData(1)">
          <ion-option value="0">All</ion-option>
          <ion-option value="10">Draft</ion-option>
          <ion-option value="5">Locked, Pending Payment</ion-option>
          <ion-option value="1">Payment Sent, Confirm Received</ion-option>
          <ion-option value="3">Received & Distribution in Progress</ion-option>
          <ion-option value="4">Transfer Completed</ion-option>
        </ion-select>
      </ion-item>
    </ion-list>
  </ion-card>

  <!-- Transfer List -->
  <ion-list>
    <button ion-item *ngFor="let transfer of transfers" (click)="transferDetails(transfer.transfer_id)">
      <ion-grid>
        <ion-row>
          <ion-col text-center>
            <p>Transfer #{{ transfer.transfer_id}}</p>
            <h2>KWD {{ transfer.company_total | number:'1.3-3' }}</h2>
            <b>{{ transfer.company_name }}</b>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col col-12 class='status'>
            <span class="status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status=='10'"> Draft </span>
            <span class="status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status=='5'"> Locked, Pending Payment </span>
            <span class="status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status=='1'"> Payment Sent, Confirm Received </span>
            <span class="status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status=='3'"> Received & Distribution in Progress </span>
            <span class="status_{{transfer.transfer_status}}" *ngIf="transfer.transfer_status=='4'"> Completed </span>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col col-12 col-sm-6>
            <p>Employee Distribution</p> 
            KWD {{ transfer.total | number:'1.3-3' }}
          </ion-col>
          <ion-col col-12 col-sm-6 *ngIf="transfer.total_transfer_cost > 0">
            <p>Transfer Cost</p>
            KWD {{ transfer.total_transfer_cost | number:'1.3-3' }}<br>
          </ion-col>
          <ion-col col-12 col-sm-6>
            <p>Profit</p>
            KWD {{ transfer.profit | number:'1.3-3' }}<br>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col col-12 col-sm-6>
            <p>Created</p>
            {{ transfer.transfer_created_at}}
          </ion-col>
          <ion-col col-12 col-sm-6>
            <p>Updated</p>
            {{ transfer.transfer_updated_at}}
          </ion-col>
        </ion-row>
      </ion-grid>
    </button>
  </ion-list>

  <ion-row text-center>
    <div class="pagination-wrapper">
      <button *ngFor="let page of pages" ion-button small color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
        {{ page }}
      </button>
    </div>
  </ion-row>

</ion-content>
