<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Candidate Payment Search</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>

  <!-- Transfer Filter -->
  <ion-card>
    <ion-list>
      <ion-list-header> Filter by </ion-list-header>
      <ion-item>
        <ion-label color="primary" stacked>Candidate Transfer ID</ion-label>
        <ion-input type="text" placeholder="Candidate Transfer ID" [(ngModel)]="transferID" (change)="loadData(1)"></ion-input>
      </ion-item>
    </ion-list>
  </ion-card>
  <!-- Transfer List -->
</ion-content>
