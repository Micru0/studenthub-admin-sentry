<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Unpaid Candidates</ion-title>

    <ion-buttons right>
      <button ion-button clear color="primary" (click)="markPaid()">
        Mark paid
      </button>
    </ion-buttons>

  </ion-navbar>
</ion-header>

<ion-content padding>

  <ion-list>
    <ion-item *ngFor="let obj of candidatelistData; let i= index">
      <ion-label>{{ obj.candidate.candidate_name }}</ion-label>
      <ion-checkbox [(ngModel)]="candidates[i]" [ngModelOptions]="{standalone: true}"></ion-checkbox>
      <ion-label>KW {{ obj.total_amount }}</ion-label>
    </ion-item>
  </ion-list>

</ion-content>
