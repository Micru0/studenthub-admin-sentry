<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ transfersCandidate && transfersCandidate[0]? "KWD " + transfersCandidate[0].total_amount + " " + transfersCandidate[0].status + " for " + transfersCandidate[0].candidate.candidate_name : "Candidate Transfer Detail" }}</ion-title>
  </ion-navbar>
</ion-header>
<ion-content>

  <section *ngIf="transfersCandidate">
    <div>
      <button ion-item *ngIf="transfersCandidate.candidate" (click)="loadCandidateDetail(transfersCandidate.candidate)">
        <ion-label class="label label-ios" *ngIf="transfersCandidate.candidate" >
          <h2>{{transfersCandidate.candidate.candidate_name}}</h2>
          <small>{{ transfersCandidate.store_name }} @ {{ transfersCandidate.company_name }}</small>
        </ion-label>
      </button>

      <div text-center>
        <h1>KWD  {{ candidatePayableAmount(transfersCandidate) | number }}</h1>
        <h2 ion-text  *ngIf="transfersCandidate.paid == '1'" color="primary">Paid</h2>
        <h2 ion-text  *ngIf="transfersCandidate.paid == '0'"  color="danger">UnPaid</h2>

        <button ion-button [disabled] = "transfersCandidate.total_amount == '0'" *ngIf="transfersCandidate.paid == '1'" (click)="markUnPaid(transfersCandidate)">
          Mark Unpaid
        </button>
        <button ion-button *ngIf="transfersCandidate.paid == '0'" (click)="markPaid(transfersCandidate)">
          Mark As Paid
        </button>
      </div>
    </div>
  </section>

</ion-content>
