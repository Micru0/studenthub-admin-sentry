<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ transfersCandidate && transfersCandidate[0]? "KWD " + transfersCandidate[0].total_amount + " " + transfersCandidate[0].status + " for " + transfersCandidate[0].candidate.candidate_name : "Candidate Transfer Detail" }}</ion-title>
  </ion-navbar>
</ion-header>
<ion-content>

  <section *ngIf="transfersCandidate && transfersCandidate.length > 0">
    <div *ngFor="let transfer of transfersCandidate">
      <button ion-item *ngIf="transfer.candidate" (click)="loadCandidateDetail(transfer.candidate)">
        <ion-avatar item-left>
          <img src="https://sh-payroll.s3.eu-west-2.amazonaws.com/{{transfer.candidate.candidate_personal_photo_thumb}}"> 
        </ion-avatar>
        <ion-label class="label label-ios" *ngIf="transfer.candidate" >
          <h2>{{transfer.candidate.candidate_name}}</h2>
          <small>{{ transfer.store_name }} @ {{ transfer.company_name }}</small>
        </ion-label>
      </button>

      <div text-center>
        <h1>KWD  {{ transfer.total_amount | number }}</h1>
        <h2 ion-text [color]="transfer.paid == '1'?'primary':'danger'">{{transfer.status}}</h2>

        <button ion-button *ngIf="transfer.paid == '1'" (click)="markUnPaid(transfer)">
          Mark Unpaid
        </button>
        <button ion-button *ngIf="transfer.paid == '0'" (click)="markPaid(transfer)">
          Mark As Paid
        </button>
      </div>
    </div>
  </section>

</ion-content>
