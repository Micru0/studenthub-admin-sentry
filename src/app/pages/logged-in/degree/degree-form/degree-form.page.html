<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="degree-list" (click)="close()"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ operation }}</ion-title>

    <ion-buttons slot="end">
      <ion-button clear color="primary" 
        [disabled]="!form.valid"
        (click)="save()">
        <span *ngIf="!saving">Save</span>
        <ion-spinner *ngIf="saving"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" *ngIf="form">
    <ion-list>
        <ion-item>
          <ion-label position="floating">Name</ion-label>
          <ion-input type="text" formControlName="name_en"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Name - Arabic</ion-label>
          <ion-input type="text" formControlName="name_ar"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Degree Group</ion-label>
          <ion-select formControlName="degree_group_uuid">
            <ion-select-option [value]="dg.degree_group_uuid" *ngFor="let dg of degreeGroups">
              {{ dg.degree_group_name_en }}
            </ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Sort Order</ion-label>
          <ion-input type="number" formControlName="sort_order"></ion-input>
        </ion-item>
    </ion-list>
  </form>
</ion-content>
