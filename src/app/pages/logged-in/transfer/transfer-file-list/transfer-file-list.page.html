<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-toggle>
        <ion-button>
          <ion-icon slot="icon-only" name="menu"></ion-icon>
        </ion-button>
      </ion-menu-toggle>
    </ion-buttons>

    <ion-title>Transfer Files</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let transferFile of transferFiles" tappable (click)="rowSelected(transferFile)">
      <div tabindex="0"></div>
      <ion-label>
        
        <h5>Transfer File # {{ transferFile.transfer_file_id }}</h5>
        <h4>Paid <b>{{ transferFile.currency_code }} {{ transferFile.transfer_amount | number:'1.3-3' }}</b> to <b>{{ transferFile.totalCandidates }} candidates</b></h4>

        <p>
          @ {{ toDate(transferFile.transfer_file_created_at) | date: 'MMM d, y, h:mm:ss a' }}
        </p>
        
      </ion-label>
    </ion-item>

    <loading-modal [loading]="loading" type="text-list"></loading-modal>
  </ion-list>

  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content>
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
