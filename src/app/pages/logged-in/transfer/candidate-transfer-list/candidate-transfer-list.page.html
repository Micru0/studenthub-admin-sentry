<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="transfer-list"></ion-back-button>
    </ion-buttons>

    <ion-title>
      <ion-label>
        Candidate Transfer List
      </ion-label>
    </ion-title>

    <ion-progress-bar type="indeterminate" *ngIf="processing"></ion-progress-bar>

  </ion-toolbar>
</ion-header>

<ion-content>
  <section *ngIf="transfersCandidate && transfersCandidate.length > 0">
    <div *ngFor="let transfer of transfersCandidate">
      <ion-item tappable *ngIf="transfer.candidate" (click)="loadTransferDetail(transfer)">
        <ion-label class="label label-ios" *ngIf="transfer.candidate" >
          <h2>{{transfer.candidate.candidate_name}}</h2>
          <small>{{ transfer.store_name }} @ {{ transfer.company_name }}</small><br/>
          <small>Amount : KWD {{ candidatePayableAmount(transfer) | number }}</small><br/>
          <small>Transfer Candidate ID : {{transfer.tc_id}}</small>
        </ion-label>
        <ion-note slot="end" *ngIf="transfer.paid == 1" >Paid</ion-note>
        <ion-note slot="end" *ngIf="transfer.paid == 0" >Unpaid</ion-note>
      </ion-item>

      <loading-modal [loading]="loading" type="text-list"></loading-modal>
    
    </div>
  </section>
</ion-content> 
<ion-footer>
  <ion-button class="background-color" [disabled]="processing" expand="full" (click)="markAllUnpaid()">
    <span *ngIf="!processing">Mark as Unpaid</span>
    <ion-spinner *ngIf="processing"></ion-spinner>
  </ion-button>
