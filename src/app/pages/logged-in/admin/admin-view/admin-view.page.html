<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="admin-list"></ion-back-button>
    </ion-buttons>

    <ion-title *ngIf="admin">{{ admin.admin_name }}</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="update()">
        Update
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list *ngIf="admin && !loading">

    <ion-item>
      <ion-label>
        <h5>Id</h5>
        <p>{{ admin.admin_id }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Admin Member</h5>
        <p>{{ admin.admin_name }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Email</h5>
        <p>{{ admin.admin_email }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Status</h5>
        <p *ngIf="admin.admin_status == 10">Active</p>
        <p *ngIf="admin.admin_status != 10">In-Active</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Access</h5>
        <p *ngIf="admin.admin_limited_access">Limited Access</p>
        <p *ngIf="!admin.admin_limited_access">Full Access</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Created at</h5>
        <p>{{ admin.admin_created_at }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Updated at</h5>
        <p>{{ admin.admin_updated_at }}</p>
      </ion-label>
    </ion-item>

  </ion-list>

  <loading-modal [loading]="loading" type="university-view"></loading-modal>
</ion-content>
<ion-footer>
  <ion-button expand="full" (click)="resetPassword()" *ngIf="!loading && admin">
    <span *ngIf="!sendingNewPassword">Send new password to staff</span>
    <ion-spinner *ngIf="sendingNewPassword"></ion-spinner>
  </ion-button>
</ion-footer>
