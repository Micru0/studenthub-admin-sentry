<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard"></ion-back-button>
    </ion-buttons>

    <ion-title *ngIf="store">{{ store.store_name }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

    <section *ngIf="store">
      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Store Name</h3>
          <p>{{ store.store_name }}</p>
        </ion-label>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h5>Location</h5>
          <p><ion-icon name="location-outline"></ion-icon> {{ store.store_location }}</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Brand Name</h3>
          <p *ngIf="store.brand">{{ store.brand.brand_name_en }}</p>
        </ion-label>
      </ion-item>

    </section>

  <ion-list *ngIf="store">

    <ion-item-divider color="light">
      <ion-label>
        Employees working at {{ store.store_name }}
      </ion-label>
    </ion-item-divider>

    <!-- If No Candidates Working at this Store -->
    <ion-item *ngIf="candidates && candidates.length == 0">
      <div tabindex="0"></div>
      <ion-label>
        This store has no employees assigned.
      </ion-label>
    </ion-item>

    <!-- If Candidates Available -->

    <app-candidate *ngFor="let candidate of candidates"  [candidate]="candidate"></app-candidate>

    <loading-modal [loading]="loading" type="review-list"></loading-modal>
  </ion-list>

  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfiniteCandidates($event)">
    <ion-infinite-scroll-content>
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
