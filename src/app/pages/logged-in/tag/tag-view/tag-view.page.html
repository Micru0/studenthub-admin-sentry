<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="tag-list"></ion-back-button>
    </ion-buttons>

    <ion-title *ngIf="tag">{{ tag.tag }}</ion-title>

    <ion-buttons slot="end" *ngIf="!authService.admin_limited_access">
      <ion-button (click)="update()">
        Update
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list *ngIf="tag">
    <ion-item>
      <div tabindex="0"></div>
      <ion-label>
        <h5>Tag ID</h5>
        <p>{{ tag.tag_id }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <div tabindex="0"></div>
      <ion-label>
        <h5>Tag Name</h5>
        <p>{{ tag.tag }}</p>
      </ion-label>
    </ion-item>

  </ion-list>
</ion-content>
