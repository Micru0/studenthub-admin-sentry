<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-menu-toggle>
        <ion-button>
          <ion-icon slot="icon-only" name="menu"></ion-icon>
        </ion-button>
      </ion-menu-toggle>
    </ion-buttons>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="staff-list"></ion-back-button>
    </ion-buttons>
    <ion-title *ngIf="staff">{{this.staff.staff_name}} permissions </ion-title>
    <ion-progress-bar type="indeterminate" *ngIf="deleting"></ion-progress-bar>

  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let section of permissionSection" [disabled]="platform.width() > 768">
      <ion-item tappable>
        <div tabindex="0"></div>

        <ion-label>
          <h5>{{ section.section_name }}</h5>
        </ion-label>
        <!-- Company dropdown for company-specific permission at section level -->
        <ion-item *ngIf="isCompanySpecific(section)" lines="none" class="company-selection">
          <ion-grid class="company-search-grid">
            <ion-row>
              <ion-col size="6">
                <ion-searchbar
                  [(ngModel)]="companySearchTerms[section.permission_uuid]"
                  (ionInput)="filterCompanies(section.permission_uuid, $event)"
                  placeholder="Search companies"
                  clearIcon="close-circle"
                  showCancelButton="focus"
                  class="full-width-search"
                >
                </ion-searchbar>
              </ion-col>
              <ion-col size="6">
                <ion-select
                  multiple="true"
                  interface="popover"
                  [(ngModel)]="companyPermissions[section.permission_uuid]"
                  class="full-width-select"
                  [selectedText]="getSelectedCompanyText(section.permission_uuid)"
                >
                  <ion-select-option
                    *ngFor="let company of (filteredCompanies[section.permission_uuid]) | slice:0:((companyPermissions[section.permission_uuid]?.length || 0) + 10)"
                    [value]="company.company_id"
                  >
                    {{ company.company_name }}
                  </ion-select-option>
                </ion-select>
              </ion-col>
            </ion-row>
          </ion-grid>
        </ion-item>
      </ion-item>
      
      <ion-list  class="sub_section" *ngIf="section.permissionSubSections">
        <ion-item tappable *ngFor="let sub of section.permissionSubSections">
          <div tabindex="0"></div>

          <ion-label>
            <h5>{{ sub.sub_section_name }}</h5>
            <p>{{ sub.sub_section_slug }}</p>


          </ion-label>
          <ion-checkbox
                  [(ngModel)]="this.userPermission[sub.permission_sub_section_uuid]"
                  [checked]="this.userPermission[sub.permission_sub_section_uuid]"
                  [value]="sub.permission_sub_section_uuid"></ion-checkbox>

        </ion-item>
      </ion-list>
    </ion-item-sliding>

    <loading-modal [loading]="loading || loadingCompanies" type="text-list"></loading-modal>

  </ion-list>

  <ion-infinite-scroll *ngIf="currentPage < pageCount"
    (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>

<ion-footer>
  <ion-button expand="full" (click)="save()">
    Save
  </ion-button>
</ion-footer>
