<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Staff Expense List</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>

  <ion-list *ngIf="!loading">
    <section>
      <ion-item tappable *ngFor="let expense of expenses" [routerLink]="['/staff-expense-view', expense.staff_expense_uuid]">
        <div tabindex="0"></div>
        <ion-label>
          <ion-text>
            <p><b>Purchase Date:</b> {{ expense.purchase_date }}</p>
            <p><b>Category:</b> {{expense.categoryLbl}}</p>
            <p><b>Supplier:</b> {{expense.supplier}}</p>
            <p><b>Amount:</b> {{expense.currency}} / {{expense.total_amount}}</p>
            <p><b>Status:</b> {{expense.statusLbl}}</p>
            <p><b>Staff:</b> {{expense.staff.staff_name}}</p>
          </ion-text>
        </ion-label>
        <ion-button color="danger" slot="end" (click)="delete($event, expense)">Delete</ion-button>
      </ion-item>
    </section>
  </ion-list>

  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
