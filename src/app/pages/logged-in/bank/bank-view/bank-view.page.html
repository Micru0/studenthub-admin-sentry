<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="bank-list"></ion-back-button>
    </ion-buttons>

    <ion-title *ngIf="bank">{{ bank.bank_name }}</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="update()">
        Update
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list *ngIf="bank">
    <ion-item>
      <ion-label>
        <h5>Bank ID</h5>
        <p>{{ bank.bank_id }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Bank Name</h5>
        <p>{{ bank.bank_name }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Bank Swift Code</h5>
        <p>{{ bank.bank_swift_code }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Bank Iban Code</h5>
        <p>{{ bank.bank_iban_code }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Bank Address</h5>
        <p>{{ bank.bank_address }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>Bank Transfer Type</h5>
        <p>{{ bank.transfer_type_value }}</p>
      </ion-label>
    </ion-item>

  </ion-list>
</ion-content>
