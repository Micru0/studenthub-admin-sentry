<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-toggle>
        <ion-button>
          <ion-icon slot="icon-only" name="menu"></ion-icon>
        </ion-button>
      </ion-menu-toggle>
    </ion-buttons>

    <ion-title>Candidates Review</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- When No Candidates left for Review -->
  <section class="ion-padding ion-text-center" *ngIf="candidates && (candidates.length == 0)">
    <h1>All done!</h1>
    <h2>No more candidates to review</h2>
  </section>
  <!-- When Candidates are Available to Review -->
  <section *ngIf="candidates && (candidates.length > 0)">
    <ion-list>
      <ion-item *ngFor="let candidate of candidates" tappable (click)="rowSelected(candidate)">
        <ion-avatar slot="start" *ngIf="candidate.candidate_personal_photo_thumb">
          <img src="https://sh-payroll.s3.eu-west-2.amazonaws.com/{{candidate.candidate_personal_photo_thumb}}">
        </ion-avatar>
        <ion-label>
          <h3>{{ candidate.candidate_name }}</h3>
          <p *ngIf="candidate.store_id > 0">{{ candidate.store.store_name }} @ {{ candidate.company.company_name }}</p>
        </ion-label>
      </ion-item>

      <loading-modal type="review-list" [loading]="loading"></loading-modal>
    </ion-list>

    <ion-row class="ion-text-center">
      <div class="pagination-wrapper">
        <ion-button *ngFor="let page of pages" size="small" color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
          {{ page }}
        </ion-button>
      </div>
    </ion-row>
  </section>

</ion-content>
