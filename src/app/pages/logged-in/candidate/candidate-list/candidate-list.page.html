<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-toggle>
        <ion-button>
          <ion-icon slot="icon-only" name="menu"></ion-icon>
        </ion-button>
      </ion-menu-toggle>
    </ion-buttons>
    <ion-title>Candidates List</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Filter by</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col size-md="3" size-lg="3" size-sm="6" size-xs="12">
            <!-- Filter by Major -->
            <ion-item>
              <ion-label position="floating" color="primary">Name</ion-label>
              <ion-input type="text" [(ngModel)]="filters.name"></ion-input>
            </ion-item>
          </ion-col>
          <ion-col size-md="3" size-lg="3" size-sm="6" size-xs="12">
            <!-- Filter by Tag -->
            <ion-item>
              <ion-label position="floating" color="primary">Email</ion-label>
              <ion-input type="text" [(ngModel)]="filters.email"></ion-input>
            </ion-item>
          </ion-col>
          <ion-col size-md="3" size-lg="3" size-sm="6" size-xs="12">
            <!-- Filter by Tag -->
            <ion-item>
              <ion-label position="floating" color="primary">Phone</ion-label>
              <ion-input type="text" [(ngModel)]="filters.phone"></ion-input>
            </ion-item>
          </ion-col>
          <ion-col size-md="3" size-lg="3" size-sm="6" size-xs="12">
            <!-- Filter by Tag -->
            <ion-item>
              <ion-label position="floating" color="primary">Civil ID</ion-label>
              <ion-input type="text" [(ngModel)]="filters.civil"></ion-input>
            </ion-item>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>

    <ion-card-header>
      <ion-button (click)="loadData(1);">Submit</ion-button>
      <ion-button (click)="resetFilter();" color="secondary">Reset</ion-button>
    </ion-card-header>

  </ion-card>
  <section>
    <ion-list>
      <app-candidate *ngFor="let candidate of candidates"  [candidate]="candidate"></app-candidate>
      <loading-modal type="review-list" [loading]="loading"></loading-modal>
    </ion-list>

    <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
      <ion-infinite-scroll-content></ion-infinite-scroll-content>
    </ion-infinite-scroll>
  </section>
</ion-content>
