<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button (click)="close()"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ operation }}</ion-title>

    <ion-buttons slot="end">
      <ion-button clear color="primary" 
        [disabled]="!form.valid"
        (click)="save()">
        <span *ngIf="!saving">Save</span>
        <ion-spinner *ngIf="saving"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <form [formGroup]="form" *ngIf="form">
    <ion-list>

      <app-image-upload
          label="Image" icon="image-outline" prefix="discount"
          formControlName="image"
      ></app-image-upload>

      <ion-item>
        <ion-label position="floating">Category</ion-label>
        <ion-select formControlName="category_id">
          <ion-select-option [value]="discountCategory.category_id" *ngFor="let discountCategory of discountCategories">
            {{ discountCategory.name_en }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <!-- company can have sub company with stores 
      <ion-item>
        <ion-label position="floating">Store</ion-label>
        <ion-select formControlName="store_id">
          <ion-select-option [value]="store.store_id" *ngFor="let store of company.stores">
            {{ store.store_name }}
          </ion-select-option>
        </ion-select>
      </ion-item>-->

      <ion-item>
        <ion-label position="floating">Description - English</ion-label>
        <ion-input type="text" formControlName="description_en"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">Description - Arabic</ion-label>
        <ion-input type="text" formControlName="description_ar"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">How to apply - English</ion-label>
        <ion-input type="text" formControlName="how_to_apply_en"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">How to apply - Arabic</ion-label>
        <ion-input type="text" formControlName="how_to_apply_ar"></ion-input>
      </ion-item>
 
      <ion-item>
        <ion-label position="floating">Valid Until / Expiry Date</ion-label>
        <ion-datetime
                  presentation="date"
                  pickerFormat="MMM DD, YYYY" 
                  displayFormat="MMM DD, YYYY"
                  formControlName="valid_until"
                ></ion-datetime>

                <!--
        <ion-input
              class="inp-valid-until"
              formControlName="valid_until"
              id="valid_until"
            ></ion-input>
            <ion-popover trigger="valid_until" size="cover">
              <ng-template>
                <ion-datetime
                  presentation="date"
                  (ionChange) = "onDateClosed($event)"
                  [value]="form.value.valid_until"
                  [showDefaultButtons]="true"
                ></ion-datetime>
              </ng-template>
            </ion-popover>-->

      </ion-item>
       
    </ion-list>
    
  </form>  
</ion-content>
