<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="university-list"></ion-back-button>
    </ion-buttons>

    <ion-title *ngIf="university">{{ university.university_name_en }}</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="update()">
        Update
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list *ngIf="university">

    <ion-item>
      <ion-label>
        <h5>University ID</h5>
        <p>{{ university.university_id }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>University Name</h5>
        <p>{{ university.university_name_en }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-label>
        <h5>University Name - Arabic</h5>
        <p>{{ university.university_name_ar }}</p>
      </ion-label>
    </ion-item>

  </ion-list>
  <br />
  <hr />

  <!-- University Student List -->
  <div class="student-list" *ngIf="candidates">
    <h5>University Students</h5>
    <ion-list>
      <ion-item *ngFor="let candidate of candidates" (click)="candidateDetail(candidate)">
        <ion-label>
          {{candidate.candidate_name}}
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
