<ion-content class='contentArea ion-padding'>

  <div class='brand'>
    <img src="assets/icon.png" />
  </div>

  <ion-card class='loginCard'>

    <ion-card-content class='authArea'>

      <!-- Login Form -->
      <form [formGroup]="form" *ngIf="form" (ngSubmit)="onSubmit()" (keyup.enter)="onSubmit()"  class="classicInput" novalidate>

        <ion-item lines="none">
          <ion-input type="text" #otpInput
            formControlName="otp"
            placeholder="Your OTP">
          </ion-input>
        </ion-item>
  
        <div class="ion-text-center">
          <ion-button expand="block" class="login-btn" type="submit"
            [disabled]="!form.valid || isLoading">
            <!-- (emailInput.value == oldEmailInput && passwordInput.value == oldPasswordInput)-->
            <ion-spinner *ngIf="isLoading"></ion-spinner>
            <span *ngIf="!isLoading">Submit</span>
          </ion-button>
        </div>

      </form>
 
    
    </ion-card-content>
  </ion-card>

</ion-content>
