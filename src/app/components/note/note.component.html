

<ion-card>
  <ion-badge>
    {{ note.note_type }}
  </ion-badge>

  <p class="note">
    <b *ngIf="note.updatedBy">{{ note.updatedBy.staff_name }}:&nbsp;</b>
    <ng-container *ngIf="note.note_text.length > 100"><span [innerHTML]="note.note_text | slice:0:100"></span>...</ng-container>
    <ng-container *ngIf="note.note_text.length < 100"><span [innerHTML]="note.note_text"></span></ng-container>
  </p>

  <p class="txt-time">
    {{ note.note_updated_datetime | timeAgo }} on
    {{ toDate(note.note_created_datetime) | date: 'MMM d, y' }}
  </p>
</ion-card>
